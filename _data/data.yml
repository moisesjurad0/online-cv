experiences:
  title: Experiences
  info:
    - role: Python Developer
      time: Jan 2024 - Present
      company: Grupo UNACEM
      details: |
        ++ Client: UNACEM Global Business Services
        
        ++ About:
        - Started at Digicem (later absorbed by Grupo UNACEM) developing robust, scalable REST APIs using FastAPI and designing schemas with SQLAlchemy and SQLModel.
        - Currently optimizing backend processes, maintaining cloud infrastructure, and building data extraction and web scraping tools using Requests and Beautiful Soup.
        - Developing automation scripts and managing CI/CD pipelines and resources on Microsoft Azure.
        
        ++ Technologies:
        - Python (FastAPI, SQLAlchemy, SQLModel, Requests, Beautiful Soup)
        - Microsoft Azure, Azure SQL
        - Docker, Kubernetes
        - CI/CD, DevOps, Terraform
        - SQL, T-SQL
        
        ++ Tools & Process:
        - Agile, Scrum

    - role: Python Developer
      time: Dec 2022 - Dec 2023
      company: Self-employed
      details: |
        ++ About:
        - Dedicated time to upskill and develop personal projects focused on modern Python backend engineering and cloud deployments.
        - Built a comprehensive RESTful API using FastAPI, SQLAlchemy, and PostgreSQL, containerized with Docker, and deployed on Azure.
        - Automated testing and CI/CD pipelines using GitHub Actions to ensure code quality and seamless deployments.
        
        ++ Technologies:
        - Python (FastAPI, SQLAlchemy)
        - PostgreSQL
        - Docker
        - GitHub Actions
        - Microsoft Azure

    - role: Lean RPA Analyst
      time: Nov 2020 - Aug 2022
      company: Indra
      details: |
        ++ Client: Telefónica del Perú | Sector: Telco

        ++ About:
        - Designed and developed RPA bots and automations for complex telecom claim processes (Osiptel, Indecopi) within the Claims Team.
        - Acted as the technical lead, overseeing production deployments, monitoring, and troubleshooting.
        - Mentored team members, conducted DevOps training, managed code repositories, and actively proposed process improvements to stakeholders.

        ++ Technologies:
        - Python (Requests, Selenium, Pandas, BeautifulSoup, SQLAlchemy)
        - Microsoft SQL Server
        - Docker, Kubernetes
        - Blue Prism (.NET)
        - Linux (AWK)
        
        ++ Tools & Process:
        - Git, BitBucket Pipelines
        - SonarCloud
        - Splunk
        - Jira
        - Scrum, RPA

    - role: Technical Leader
      time: Oct 2019 - Nov 2020
      company: Global HITSS
      details: |
        ++ Client: Claro (América Móvil) | Sector: Telco

        ++ About:
        - Promoted to Technical Leader to guide the team in delivering critical notification features for prepaid clients (e.g., Navigation Attempts, Degradation of LTE).
        - Managed E2E notification processes, production deployments, and risk management initiatives.
        - Led the migration of Linux scripts from Optiva IN to Ericsson CBIO.
        - Programmed EAI integrations to optimize transaction loads using Huawei PCRF, and troubleshooted high-priority issues for the Prepaid Platform.

        ++ Technologies:
        - Java (Spring, Maven, JMS, MDB)
        - Oracle WebLogic (SOA, OSB, EAI)
        - Oracle DB
        - Linux Scripting
        - Huawei Push Gateway
        - Nokia IN Unified OCS
        
        ++ Tools & Process:
        - Git, SVN
        - SonarQube
        - ELK Stack
        - SoapUI
        - IBM Rational Team Concert
        - Scrum & Waterfall

    - role: Software Developer
      time: Oct 2018 - Oct 2019
      company: MDP Consulting
      details: |
        ++ Client: Claro (América Móvil) | Sector: Telco

        ++ About:
        - Developed, tested, and delivered features for the "Automatic Mobile Notifications" engine, which triggered interactive data package sales, generating approximately $15 million in monthly revenue.
        - Implemented high-impact notification features including "Recharge", "Triple Credit", and "Upgrade at Data Depletion".

        ++ Technologies:
        - Java (Spring, JMS, MDB, EDA)
        - Oracle WebLogic (SOA, OSB)
        - Oracle DB
        - Linux Scripting
        - Huawei USSD Push Gateway
        
        ++ Tools & Process:
        - Git, SVN
        - SonarQube
        - SoapUI
        - Postman
        - Scrum & Waterfall

    - role: Software Developer
      time: Apr 2018 - Oct 2018
      company: MDP Consulting
      details: |
        ++ Client: Belmond | Sector: Luxury Hospitality & Travel

        ++ About: 
        - Contributed to the "Schools Web" project, modifying business rules and dynamic fares for local train field trips in Cusco.
        - Developed the "Information Screens" project to provide real-time informational displays for train passengers.

        ++ Technologies:
        - C# (.NET, ASP.NET MVC, WCF, Entity Framework)
        - Microsoft SQL Server
        - JavaScript (jQuery, AJAX)
        - HTML5, CSS3
        - Azure
        
        ++ Tools & Process:
        - Git, BitBucket
        - SonarQube
        - SoapUI
        - Scrum

    - role: Software Developer
      time: Aug 2016 - Jun 2017
      company: Sanitas Perú EPS
      details: |
        ++ Client: Internal IT staff member | Sector: Health Insurance Provider

        ++ About:
        - Developed and maintained features for the primary affiliations and sales application.
        - Created a Windows service for real-time reporting of affiliations and interactions to the National Superintendence of Health (SUSALUD) using WebSphere MQ.
        - Conducted training sessions on Git and GitLab for the developer team to improve version control practices.

        ++ Technologies:
        - C# (.NET, ASP.NET MVC, WCF, NHibernate)
        - Oracle DB
        - JavaScript (jQuery, Node.js)
        - HTML5, CSS3
        - WebSphere MQ
        
        ++ Tools & Process:
        - Git, GitLab
        - SoapUI
        - Agile

    - role: Software Developer
      time: Aug 2014 - Aug 2016
      company: Cosapi Data
      details: |
        ++ Client: Claro (América Móvil) | Sector: Telco

        ++ About:
        - Developed, documented, and implemented multiple features across 12+ internal applications, focusing on prepaid, postpaid, and sales web platforms.
        - Served as a level 3 escalation point, successfully resolving over 150 complex helpdesk tickets across 20+ applications.

        ++ Technologies:
        - C# (.NET, ASP.NET, WCF)
        - Visual Basic
        - Oracle DB
        - JavaScript (jQuery, AJAX)
        - AutoIt
        
        ++ Tools & Process:
        - SoapUI
        - Microsoft TFS
        - Waterfall

    - role: Software Developer
      time: Oct 2013 - Jun 2014
      company: Matzziel Salcedo Consultores
      details: |
        ++ Clients: Retirement Military Cooperative Aid (ACMR Perú) & Internal
        
        ++ About: 
        - Developed a comprehensive application for managing collections, bonuses, and loans for ACMR Perú.
        - Built and enhanced an in-house "Warehouse Management" application, implementing new modules and integrating it with Siscont (third-party software).
        - Executed a successful database migration to SQL Server 2008 and upgraded the DevExpress UI framework.

        ++ Technologies:
        - C# (.NET)
        - Visual Basic
        - Microsoft SQL Server
        - DevExpress

    - role: System Assistant
      time: Mar 2013 - Aug 2013
      company: METROIL
      details: |
        ++ Client: Internal IT staff member | Sector: Metrology Services

        ++ About:
        - Maintained the internal "Calibrations app" for a company specializing in measuring device certification.
        - Provided technical support to Debian users, ensuring seamless remote desktop connectivity to Windows Servers via rdesktop.

        ++ Technologies:
        - Visual Basic 6.0
        - Microsoft SQL Server
        - Windows Server
        - Debian GNU/Linux

