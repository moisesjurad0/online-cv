    - role: Technical Leader
      time: Oct 2019 - Nov 2020
      company: Global HITSS
      details: |
        ++ Client: Claro (América Móvil)
        ++ Sector: Telco

        ++ About:
        After my previous experience working for the same client I became technical leader and successfully guided the same team in achieving additional goals, e.g.
        - "Navigation Attempt for Prepaid Clients - Notification" feature.
        - "Turning Phone On for Prepaid Clients - Notification" feature.
        - "Degradation of Wireless Internet IFI and LTE - Notification" feature.
        - Notifications Processes E2E - Maintenance and documentation aligned to Claro Development Standards.
        - Management and monitoring of Production Passes.
        - Risk Management of initiatives.
        - Issues troubleshooting for Prepaid Platform & Apps.
        - Participation in the committees of production passes. Transfer to support and monitoring teams.
        - Linux Scripts migration from using IN (Optiva) to use CBIO (Ericson).
        - Programming of the EAI integration to reduce the load of transactions reaching the IN, using Huawei PCRF as an intermediary.

        ++ Technologies:
        - Java
        - Spring
        - Maven
        - SOAP
        - REST
        - Java Message Service (JMS)
        - Message-Driven Bean (MDB)
        - Event-Driven Architecture (EDA)
        - Oracle WebLogic Server SOA
        - Oracle WebLogic Server Middleware
        - Oracle WebLogic EAI
        - Oracle Service Bus (OSB)
        - Oracle Database (PL/SQL)
        - Linux scripting
        - Apache James Server
        - Huawei - USSD Push Gateway (Unstructured Supplementary Service Data)
        - Huawei - IPCC IVR (Internet Protocol Contact Center, Interactive Voice Response)
        - Mobiera - SAT Push Gateway (Service Access Terminal)
        - Mahindra - NGAGE Notifications Manager
        - Nokia - IN Unified OCS (Intelligent Network, Online Charging System)
        - Optiva - IN (Intelligent Network)
        - Huawei - PCRF (Policy and Charging Rules Function)
        - AWK

        ++ Process: Scrum & Waterfall

        ++ Tools:
        - IBM Rational Team Concert
        - Git, BitBucket
