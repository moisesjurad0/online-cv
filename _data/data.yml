experiences:
  title: Experiences
  info:
    - role: Python Developer
      time: Jan 2024 - Present
      company: Grupo UNACEM
      details: |
        ++ About:
        - Started at Digicem (later absorbed by Grupo UNACEM) developing robust REST APIs with FastAPI and designing database schemas using SQLAlchemy and SQLModel for the "Inventories" backend, a critical project supporting the flagship "Progresolplus" platform.
        - Deployed and scaled Python backend applications using Azure App Service, engineered data extraction tools (Requests, Beautiful Soup), and implemented automated PDF generation using WeasyPrint.
        - Maintained backend processes and oversaw CI/CD pipelines as an Azure DevOps Administrator for various project repositories to ensure reliable deployments.
        - Developed an event-driven automation pipeline for cement bag orders, utilizing Azure Logic Apps to capture incoming email events and processing them via FastAPI on Azure Functions, achieving centralized order management in Azure SQL.
        
        ++ Technologies:
        - Python
        - Python - FastAPI
        - Python - SQLAlchemy
        - Python - SQLModel
        - Python - Requests
        - Python - Beautiful Soup
        - Python - WeasyPrint
        - Microsoft Azure
        - Azure SQL
        - Azure App Service
        - Azure Functions
        - Azure Logic Apps
        - Azure DevOps
        - Azure Key Vault
        - Docker
        - Docker Compose
        - Terraform
        - Markdown
        - Mermaid
        - Marp
        
        ++ Process: Agile, Scrum

    - role: Python Developer
      time: Dec 2022 - Dec 2023
      company: Independent Backend Engineer
      details: |
        ++ About:
        - Developed REST APIs with FastAPI and PostgreSQL
        - Built cloud-based solutions on AWS
        - Worked on CI/CD automation and containerization with Docker and GitHub Actions
        
        ++ Technologies:
        - Python
        - Python - FastAPI
