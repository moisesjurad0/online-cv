---
layout: default
---

<header class="page-header">
  <div class="container container-narrow">
    {%- if page.kicker -%}<p class="page-header__kicker">{{ page.kicker }}</p>{%- endif -%}
    <h1>{{ page.title }}</h1>
    {%- if page.subtitle -%}<p class="text-muted" style="font-size: 1.1rem; max-width: 36em;">{{ page.subtitle }}</p>{%- endif -%}
  </div>
</header>

<article class="section">
  <div class="container container-narrow">
    {{ content }}
  </div>
</article>
